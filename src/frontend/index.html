<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>/* __CSS__ */</style>
</head>
<body>
  <div id="titlebar">
    <div class="titlebar-actions">
      <button id="btn-open" tabindex="-1" title="Open (Ctrl+O)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 13V4.5a1 1 0 0 1 1-1h3l1.5 1.5H13a1 1 0 0 1 1 1V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button id="btn-prev" tabindex="-1" title="Previous PDF (Left Arrow)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-next" tabindex="-1" title="Next PDF (Right Arrow)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="titlebar-sep"></div>
      <button id="btn-zoom-out" tabindex="-1" title="Zoom Out (Ctrl+-)">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M5 7h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button id="btn-zoom-in" tabindex="-1" title="Zoom In (Ctrl++)">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M5 7h4M7 5v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button id="btn-fit-width" tabindex="-1" title="Fit Width (W)" class="active">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M4 8h8M4 8l2-2M4 8l2 2M12 8l-2-2M12 8l-2 2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-fit-page" tabindex="-1" title="Fit Page (F)">
        <svg viewBox="0 0 16 16" fill="none"><rect x="2.5" y="2.5" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 3.5L6.5 6.5M12.5 3.5L9.5 6.5M3.5 12.5L6.5 9.5M12.5 12.5L9.5 9.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
      </button>
      <div class="titlebar-sep"></div>
      <button id="btn-toc" tabindex="-1" title="Outline (Ctrl+Shift+O)">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 3h10M3 6.5h7M3 10h8M3 13.5h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <span id="titlebar-title">PeekPDF</span>
    <div id="window-controls">
      <button id="btn-theme" tabindex="-1" title="Toggle Theme">
        <svg id="icon-sun" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14M3.75 3.75l1.06 1.06M11.19 11.19l1.06 1.06M3.75 12.25l1.06-1.06M11.19 4.81l1.06-1.06" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <svg id="icon-moon" viewBox="0 0 16 16" fill="none"><path d="M13.5 8.5a5.5 5.5 0 0 1-6-6 5.5 5.5 0 1 0 6 6z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      </button>
      <div class="window-controls-sep"></div>
      <button id="btn-minimize" tabindex="-1" title="Minimize">
        <svg viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5"/></svg>
      </button>
      <button id="btn-maximize" tabindex="-1" title="Maximize">
        <svg viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" rx="1"/></svg>
      </button>
      <button id="btn-close" tabindex="-1" title="Close">
        <svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>
      </button>
    </div>
  </div>

  <div id="find-bar">
    <input id="find-input" type="text" placeholder="Find in PDF..." spellcheck="false">
    <span id="find-count"></span>
    <button id="find-prev" title="Previous (Shift+Enter)">
      <svg viewBox="0 0 10 10"><polyline points="2,7 5,3 8,7" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="find-next" title="Next (Enter)">
      <svg viewBox="0 0 10 10"><polyline points="2,3 5,7 8,3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="find-close" title="Close (Escape)">
      <svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>
    </button>
  </div>

  <div id="content">
    <div id="toc-panel">
      <div id="toc-list"></div>
    </div>
    <div id="viewer-container">
      <div id="welcome-panel">
        <div class="welcome-icon">
          <svg viewBox="0 0 48 48" fill="none">
            <path d="M12 4h18l10 10v28a2 2 0 0 1-2 2H12a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2"/>
            <path d="M30 4v10h10" stroke="currentColor" stroke-width="2"/>
            <path d="M16 22h16M16 28h16M16 34h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="welcome-text">Drop a PDF or press Ctrl+O</div>
        <div class="welcome-formats">PDF documents</div>
      </div>
      <div id="pdf-viewer"></div>
      <div id="loading-spinner"></div>
    </div>
  </div>

  <div id="zoom-toast"></div>

  <div id="drop-overlay">
    <div class="drop-message">Drop to open</div>
  </div>

  <div id="statusbar">
    <span id="status-filename"></span>
    <span id="status-page"></span>
    <span id="status-filesize"></span>
    <span id="status-zoom">100%</span>
    <span id="status-right">
      <span id="status-goto">
        <input id="goto-input" type="text" tabindex="-1" title="Go to page (Enter)">
      </span>
      <span id="status-nav"></span>
    </span>
  </div>

  <!-- __SCRIPTS__ -->
</body>
</html>
